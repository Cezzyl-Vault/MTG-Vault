<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG-Vault</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3e;
    --accent: #c8a84b;
    --accent2: #7b5ea7;
    --accent3: #3d9bc1;
    --text: #e8e4d4;
    --text-muted: #8a8070;
    --danger: #c14a4a;
    --success: #4a9b6f;
    --rare: #c8a84b;
    --uncommon: #aab8c2;
    --common: #1a1a26;
    --mythic: #e8732a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 16px;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(123,94,167,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(61,155,193,0.06) 0%, transparent 50%);
  }

  /* ─── HEADER ─── */
  header {
    background: linear-gradient(180deg, rgba(10,10,15,0.98) 0%, rgba(18,18,26,0.95) 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-inner {
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    height: 60px;
    flex-wrap: wrap;
    padding: 0.5rem 0;
  }
  .logo {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 1.3rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-shadow: 0 0 20px rgba(200,168,75,0.3);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .logo span { color: var(--text-muted); font-weight: 400; font-size: 0.75rem; display: block; letter-spacing: 0.2em; }

  /* ─── NAV TABS ─── */
  .nav-tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .nav-tab {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    padding: 0.5rem 1rem;
    cursor: pointer;
    transition: all 0.2s;
    border-right: 1px solid var(--border);
  }
  .nav-tab:last-child { border-right: none; }
  .nav-tab:hover { background: var(--surface2); color: var(--text); }
  .nav-tab.active { background: var(--accent); color: var(--bg); font-weight: 600; }

  /* ─── IMPORT BUTTON ─── */
  .import-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    padding: 0.45rem 1.1rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .import-btn:hover { background: var(--accent); color: var(--bg); }
  #fileInput { display: none; }

  /* ─── MAIN ─── */
  main {
    max-width: 1600px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  /* ─── VIEWS ─── */
  .view { display: none; }
  .view.active { display: block; }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center;
    padding: 6rem 2rem;
    color: var(--text-muted);
  }
  .empty-state .icon {
    font-size: 4rem;
    margin-bottom: 1.5rem;
    opacity: 0.4;
  }
  .empty-state h2 {
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    color: var(--text);
    margin-bottom: 0.75rem;
  }
  .empty-state p { font-size: 1.05rem; line-height: 1.6; }
  .empty-cta {
    margin-top: 2rem;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    padding: 0.75rem 2rem;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .empty-cta:hover { opacity: 0.85; }

  /* ─── FILTERS BAR ─── */
  .filters {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    padding: 0.55rem 0.75rem 0.55rem 2.2rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 0.65rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 0.85rem;
    pointer-events: none;
  }
  .filter-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 0.95rem;
    padding: 0.55rem 0.75rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    min-width: 130px;
  }
  .filter-select:focus { border-color: var(--accent); }
  .filter-select option { background: var(--surface2); }

  .view-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .view-toggle button {
    background: transparent;
    border: none;
    color: var(--text-muted);
    padding: 0.55rem 0.8rem;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
    border-right: 1px solid var(--border);
  }
  .view-toggle button:last-child { border-right: none; }
  .view-toggle button.active { background: var(--surface2); color: var(--accent); }

  .stats-bar {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    color: var(--text-muted);
    font-size: 0.9rem;
    align-items: center;
  }
  .stats-bar strong { color: var(--accent); font-size: 1rem; }

  /* ─── CARD GRID ─── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
    gap: 1rem;
  }
  @media (max-width: 480px) {
    .card-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; }
  }

  .card-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .card-item:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 8px 30px rgba(200,168,75,0.15);
  }
  .card-item .img-wrap {
    aspect-ratio: 5/7;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }
  .card-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.3s;
  }
  .card-item .img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 2rem;
    gap: 0.5rem;
  }
  .card-item .img-placeholder span {
    font-size: 0.7rem;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.05em;
    text-align: center;
    padding: 0 0.5rem;
  }

  .rarity-bar {
    height: 3px;
    width: 100%;
  }
  .rarity-bar.mythic { background: var(--mythic); }
  .rarity-bar.rare { background: var(--rare); }
  .rarity-bar.uncommon { background: var(--uncommon); }
  .rarity-bar.common { background: var(--border); }

  .card-meta {
    padding: 0.6rem 0.7rem 0.7rem;
  }
  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 0.25rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-sub {
    font-size: 0.78rem;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.3rem;
  }
  .badge {
    font-size: 0.62rem;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .badge-foil { background: rgba(200,168,75,0.2); color: var(--accent); }
  .badge-qty { background: var(--surface2); color: var(--text-muted); }
  .badge-misprint { background: rgba(193,74,74,0.2); color: #e07070; }
  .badge-altered { background: rgba(123,94,167,0.2); color: #b090d0; }

  .qty-badge {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    background: rgba(0,0,0,0.75);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    padding: 0.15rem 0.45rem;
    backdrop-filter: blur(4px);
  }

  /* ─── LIST VIEW ─── */
  .card-list {
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .list-header {
    display: grid;
    grid-template-columns: 2fr 1fr 0.7fr 0.7fr 0.5fr 0.5fr 0.6fr 0.8fr 80px;
    gap: 0;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 0.5rem 1rem;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--text-muted);
  }
  @media (max-width: 700px) {
    .list-header { display: none; }
  }
  .list-row {
    display: grid;
    grid-template-columns: 2fr 1fr 0.7fr 0.7fr 0.5fr 0.5fr 0.6fr 0.8fr 80px;
    gap: 0;
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    align-items: center;
    font-size: 0.9rem;
  }
  .list-row:last-child { border-bottom: none; }
  .list-row:hover { background: var(--surface2); }
  @media (max-width: 700px) {
    .list-row {
      grid-template-columns: 1fr 1fr;
      gap: 0.25rem 1rem;
      padding: 0.75rem 1rem;
    }
  }
  .list-row .name-col {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .list-row .col { color: var(--text-muted); font-size: 0.85rem; }
  .list-actions { display: flex; gap: 0.4rem; justify-content: flex-end; }
  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 4px;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 0.75rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(6px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 720px;
    max-height: 90vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  @media (min-width: 700px) {
    .modal-inner { display: grid; grid-template-columns: 240px 1fr; gap: 0; }
  }
  .modal-img-side {
    background: var(--surface2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 1.5rem 1rem;
    gap: 0.75rem;
    border-right: 1px solid var(--border);
  }
  .modal-img-side img {
    width: 100%;
    max-width: 200px;
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  .modal-img-placeholder {
    width: 100%;
    max-width: 200px;
    aspect-ratio: 5/7;
    background: var(--surface);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: var(--text-muted);
  }
  .modal-detail {
    padding: 1.5rem;
    flex: 1;
  }
  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
  }
  .modal-set {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 1.25rem;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }
  .detail-item label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 0.2rem;
  }
  .detail-item .val {
    font-size: 0.95rem;
    color: var(--text);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .modal-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 4px;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { border-color: var(--danger); color: var(--danger); }

  /* Edit form */
  .edit-form { display: flex; flex-direction: column; gap: 0.75rem; }
  .edit-form input, .edit-form select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 0.95rem;
    padding: 0.5rem 0.75rem;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }
  .edit-form input:focus, .edit-form select:focus { border-color: var(--accent); }
  .edit-form label { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.08em; color: var(--text-muted); display: block; margin-bottom: 0.2rem; }
  .btn { border: none; border-radius: 5px; cursor: pointer; font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.08em; padding: 0.55rem 1.2rem; transition: opacity 0.2s; }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn:hover { opacity: 0.85; }
  .btn-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; }

  /* ─── STATS VIEW ─── */
  .stats-section { margin-bottom: 2rem; }
  .stats-section h2 {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.1rem 1.2rem;
  }
  .kpi-val {
    font-family: 'Cinzel', serif;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 0.3rem;
  }
  .kpi-label { font-size: 0.8rem; color: var(--text-muted); }

  .chart-wrap { position: relative; }
  .bar-chart { display: flex; flex-direction: column; gap: 0.5rem; }
  .bar-row { display: flex; align-items: center; gap: 0.75rem; }
  .bar-label { width: 90px; font-size: 0.85rem; color: var(--text-muted); text-align: right; flex-shrink: 0; }
  .bar-track {
    flex: 1;
    height: 22px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s cubic-bezier(.4,0,.2,1);
    display: flex;
    align-items: center;
    padding-left: 0.5rem;
    font-size: 0.75rem;
    font-family: 'Cinzel', serif;
    color: rgba(0,0,0,0.7);
    min-width: 30px;
  }
  .mana-chart { display: flex; align-items: flex-end; gap: 0.5rem; height: 140px; }
  .mana-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
  .mana-bar {
    width: 100%;
    background: var(--accent2);
    border-radius: 3px 3px 0 0;
    min-height: 4px;
    transition: height 0.8s cubic-bezier(.4,0,.2,1);
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 0.2rem;
    font-size: 0.7rem;
    font-family: 'Cinzel', serif;
    color: rgba(255,255,255,0.8);
  }
  .mana-label { font-size: 0.8rem; color: var(--text-muted); }

  .color-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 0.75rem;
  }
  .color-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    text-align: center;
  }
  .color-sym { font-size: 1.8rem; margin-bottom: 0.3rem; }
  .color-name { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 0.2rem; }
  .color-count { font-size: 1.1rem; color: var(--text); }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 0.75rem 1.25rem;
    border-radius: 6px;
    font-size: 0.9rem;
    z-index: 300;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ─── RARITY DOTS ─── */
  .rarity-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .rarity-dot.mythic { background: var(--mythic); }
  .rarity-dot.rare { background: var(--rare); }
  .rarity-dot.uncommon { background: var(--uncommon); }
  .rarity-dot.common { background: var(--text-muted); }

  .condition-badge {
    font-size: 0.72rem;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    font-family: 'Cinzel', serif;
  }
  .cond-nm { background: rgba(74,155,111,0.2); color: #6dd4a0; }
  .cond-lp { background: rgba(61,155,193,0.2); color: #7dd0ee; }
  .cond-mp { background: rgba(200,168,75,0.2); color: var(--accent); }
  .cond-hp { background: rgba(193,74,74,0.2); color: #e07070; }
  .cond-dm { background: rgba(150,50,50,0.3); color: #c05050; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      MTG-VAULT
      <span>COLLECTION MANAGER</span>
    </div>
    <nav class="nav-tabs">
      <button class="nav-tab active" onclick="switchView('collection')">Sammlung</button>
      <button class="nav-tab" onclick="switchView('stats')">Statistiken</button>
    </nav>
    <label class="import-btn" for="fileInput">⬆ CSV Importieren</label>
    <input type="file" id="fileInput" accept=".csv">
  </div>
</header>

<main>
  <!-- COLLECTION VIEW -->
  <div id="view-collection" class="view active">
    <div id="collection-empty" class="empty-state">
      <div class="icon">🃏</div>
      <h2>Deine Sammlung ist leer</h2>
      <p>Importiere eine CSV-Datei von ManaBox oder einem anderen Tool,<br>um deine Karten hier zu verwalten und anzuzeigen.</p>
      <button class="empty-cta" onclick="document.getElementById('fileInput').click()">CSV Importieren</button>
    </div>
    <div id="collection-content" style="display:none">
      <div class="filters">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Karte suchen…" oninput="applyFilters()">
        </div>
        <select class="filter-select" id="filterRarity" onchange="applyFilters()">
          <option value="">Alle Seltenheiten</option>
          <option value="mythic">Mythic</option>
          <option value="rare">Rare</option>
          <option value="uncommon">Uncommon</option>
          <option value="common">Common</option>
        </select>
        <select class="filter-select" id="filterFoil" onchange="applyFilters()">
          <option value="">Foil / Normal</option>
          <option value="foil">Foil</option>
          <option value="normal">Normal</option>
        </select>
        <select class="filter-select" id="filterSet" onchange="applyFilters()">
          <option value="">Alle Sets</option>
        </select>
        <select class="filter-select" id="filterCondition" onchange="applyFilters()">
          <option value="">Alle Zustände</option>
          <option value="near_mint">Near Mint</option>
          <option value="lightly_played">Lightly Played</option>
          <option value="moderately_played">Moderately Played</option>
          <option value="heavily_played">Heavily Played</option>
          <option value="damaged">Damaged</option>
        </select>
        <div class="view-toggle">
          <button id="viewGrid" class="active" onclick="setViewMode('grid')" title="Rasteransicht">⊞</button>
          <button id="viewList" onclick="setViewMode('list')" title="Listenansicht">☰</button>
        </div>
      </div>
      <div class="stats-bar" id="statsBar"></div>
      <div id="cardContainer"></div>
    </div>
  </div>

  <!-- STATS VIEW -->
  <div id="view-stats" class="view">
    <div id="stats-empty" class="empty-state">
      <div class="icon">📊</div>
      <h2>Keine Daten verfügbar</h2>
      <p>Importiere zuerst eine CSV-Datei, um Statistiken zu sehen.</p>
    </div>
    <div id="stats-content" style="display:none"></div>
  </div>
</main>

<!-- DETAIL / EDIT MODAL -->
<div class="modal-overlay" id="cardModal">
  <div class="modal">
    <div class="modal-header">
      <span id="modalTitle" style="font-family:'Cinzel',serif;font-size:0.85rem;letter-spacing:0.1em;color:var(--text-muted)">KARTEN DETAIL</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-inner" id="modalInner"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let allCards = [];
let filtered = [];
let viewMode = 'grid'; // 'grid' | 'list'
let editingIndex = null;

const STORAGE_KEY = 'magicvault_v1';

// ═══════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(allCards)); } catch(e){}
}
function load() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) { allCards = JSON.parse(d); renderAll(); }
  } catch(e){}
}

// ═══════════════════════════════════════════
//  CSV PARSER
// ═══════════════════════════════════════════
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => parseCSV(ev.target.result);
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
});

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) { showToast('CSV ist leer oder ungültig.'); return; }

  const headers = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase().replace(/\s+/g,'_'));

  const col = name => {
    const aliases = {
      name: ['name','kartenname','card_name'],
      set_code: ['set_code','set','setcode','edition','set_id'],
      set_name: ['set_name','setname','edition_name'],
      collector_number: ['collector_number','collectornumber','number','#'],
      foil: ['foil','foil?'],
      rarity: ['rarity','seltenheit'],
      quantity: ['quantity','qty','anzahl','count','amount'],
      manabox_id: ['manabox_id','manaboxid','id'],
      scryfall_id: ['scryfall_id','scryfallid','uuid'],
      purchase_price: ['purchase_price','purchaseprice','price','preis','kaufpreis'],
      misprint: ['misprint'],
      altered: ['altered'],
      condition: ['condition','zustand','grade'],
      language: ['language','lang','sprache'],
      purchase_price_currency: ['purchase_price_currency','currency','währung','waehrung'],
    };
    const list = aliases[name] || [name];
    for (const a of list) {
      const idx = headers.indexOf(a);
      if (idx !== -1) return idx;
    }
    return -1;
  };

  const newCards = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const cells = parseCSVLine(lines[i]);
    const g = (key) => { const idx = col(key); return idx >= 0 ? (cells[idx] || '').trim() : ''; };
    newCards.push({
      name: g('name'),
      set_code: g('set_code').toUpperCase(),
      set_name: g('set_name'),
      collector_number: g('collector_number'),
      foil: g('foil').toLowerCase(),
      rarity: g('rarity').toLowerCase(),
      quantity: parseInt(g('quantity')) || 1,
      manabox_id: g('manabox_id'),
      scryfall_id: g('scryfall_id'),
      purchase_price: g('purchase_price'),
      misprint: g('misprint').toLowerCase() === 'true',
      altered: g('altered').toLowerCase() === 'true',
      condition: g('condition').toLowerCase(),
      language: g('language'),
      currency: g('purchase_price_currency') || 'EUR',
      _id: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2),
    });
  }

  if (newCards.length === 0) { showToast('Keine Karten gefunden.'); return; }
  allCards = [...allCards, ...newCards];
  save();
  renderAll();
  showToast(`✓ ${newCards.length} Karten importiert`);
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += c;
  }
  result.push(cur);
  return result;
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function renderAll() {
  populateSetFilter();
  applyFilters();
  renderStats();

  const hasCards = allCards.length > 0;
  document.getElementById('collection-empty').style.display = hasCards ? 'none' : '';
  document.getElementById('collection-content').style.display = hasCards ? '' : 'none';
  document.getElementById('stats-empty').style.display = hasCards ? 'none' : '';
  document.getElementById('stats-content').style.display = hasCards ? '' : 'none';
}

function populateSetFilter() {
  const sel = document.getElementById('filterSet');
  const current = sel.value;
  const sets = [...new Map(allCards.map(c => [c.set_code, c.set_name || c.set_code])).entries()]
    .sort((a,b) => a[1].localeCompare(b[1]));
  sel.innerHTML = '<option value="">Alle Sets</option>' +
    sets.map(([code, name]) => `<option value="${code}">${name} (${code})</option>`).join('');
  sel.value = current;
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const rarity = document.getElementById('filterRarity').value;
  const foil = document.getElementById('filterFoil').value;
  const set = document.getElementById('filterSet').value;
  const cond = document.getElementById('filterCondition').value;

  filtered = allCards.filter(c => {
    if (q && !c.name.toLowerCase().includes(q) && !c.set_name.toLowerCase().includes(q)) return false;
    if (rarity && c.rarity !== rarity) return false;
    if (foil === 'foil' && c.foil !== 'foil') return false;
    if (foil === 'normal' && c.foil === 'foil') return false;
    if (set && c.set_code !== set) return false;
    if (cond && !c.condition.includes(cond.split('_')[0])) return false;
    return true;
  });

  const total = filtered.reduce((s,c) => s + c.quantity, 0);
  document.getElementById('statsBar').innerHTML =
    `<span>${filtered.length} <strong>Einträge</strong></span>` +
    `<span>${total} <strong>Karten gesamt</strong></span>` +
    (filtered.length !== allCards.length ? `<span style="color:var(--accent2)">(gefiltert von ${allCards.length})</span>` : '');

  renderCards();
}

function renderCards() {
  const container = document.getElementById('cardContainer');
  if (filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:4rem;color:var(--text-muted)">Keine Karten gefunden.</div>';
    return;
  }

  if (viewMode === 'grid') {
    container.innerHTML = '<div class="card-grid">' +
      filtered.map((c, i) => cardGridHTML(c, allCards.indexOf(c))).join('') +
    '</div>';
    // Lazy-load images
    container.querySelectorAll('[data-src]').forEach(el => {
      const img = new Image();
      img.onload = () => { el.src = el.dataset.src; el.removeAttribute('data-src'); };
      img.onerror = () => {};
      img.src = el.dataset.src;
    });
  } else {
    container.innerHTML =
      '<div class="card-list">' +
      '<div class="list-header"><span>NAME</span><span>SET</span><span>SELTENHEIT</span><span>ZUSTAND</span><span>FOIL</span><span>ANZAHL</span><span>PREIS</span><span>SPRACHE</span><span></span></div>' +
      filtered.map((c) => cardListHTML(c, allCards.indexOf(c))).join('') +
      '</div>';
  }
}

function scryfallImgUrl(c) {
  if (c.scryfall_id) return `https://cards.scryfall.io/normal/front/${c.scryfall_id[0]}/${c.scryfall_id[1]}/${c.scryfall_id}.jpg`;
  return null;
}

function rarityClass(r) {
  if (r === 'mythic') return 'mythic';
  if (r === 'rare') return 'rare';
  if (r === 'uncommon') return 'uncommon';
  return 'common';
}

function condClass(c) {
  if (c.includes('near')) return 'cond-nm';
  if (c.includes('light')) return 'cond-lp';
  if (c.includes('moderate')) return 'cond-mp';
  if (c.includes('heavy')) return 'cond-hp';
  if (c.includes('damage')) return 'cond-dm';
  return '';
}
function condLabel(c) {
  if (c.includes('near')) return 'NM';
  if (c.includes('light')) return 'LP';
  if (c.includes('moderate')) return 'MP';
  if (c.includes('heavy')) return 'HP';
  if (c.includes('damage')) return 'DM';
  return c.toUpperCase().slice(0,3);
}

function cardGridHTML(c, idx) {
  const img = scryfallImgUrl(c);
  const rc = rarityClass(c.rarity);
  const badges = [
    c.foil === 'foil' ? '<span class="badge badge-foil">✦ FOIL</span>' : '',
    c.misprint ? '<span class="badge badge-misprint">⚠ MISPRINT</span>' : '',
    c.altered ? '<span class="badge badge-altered">✎ ALTERED</span>' : '',
  ].filter(Boolean).join('');

  return `<div class="card-item" onclick="openModal(${idx})">
    <div class="img-wrap">
      ${img
        ? `<img src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" data-src="${img}" alt="${esc(c.name)}" loading="lazy">`
        : `<div class="img-placeholder">🃏<span>${esc(c.name)}</span></div>`}
      ${c.quantity > 1 ? `<span class="qty-badge">×${c.quantity}</span>` : ''}
    </div>
    <div class="rarity-bar ${rc}"></div>
    <div class="card-meta">
      <div class="card-name" title="${esc(c.name)}">${esc(c.name)}</div>
      <div class="card-sub">
        <span>${esc(c.set_code)}${c.collector_number ? ' #'+esc(c.collector_number) : ''}</span>
        <div style="display:flex;gap:3px;align-items:center;flex-wrap:wrap">
          ${badges}
        </div>
      </div>
    </div>
  </div>`;
}

function cardListHTML(c, idx) {
  const rc = rarityClass(c.rarity);
  const price = c.purchase_price ? `${parseFloat(c.purchase_price).toFixed(2)} ${c.currency}` : '–';
  const cond = c.condition ? `<span class="condition-badge ${condClass(c.condition)}">${condLabel(c.condition)}</span>` : '–';
  return `<div class="list-row" onclick="openModal(${idx})">
    <span class="name-col">
      <span class="rarity-dot ${rc}" style="margin-right:6px"></span>${esc(c.name)}
    </span>
    <span class="col">${esc(c.set_name || c.set_code)}</span>
    <span class="col" style="text-transform:capitalize">${esc(c.rarity)}</span>
    <span class="col">${cond}</span>
    <span class="col">${c.foil === 'foil' ? '✦' : '–'}</span>
    <span class="col">×${c.quantity}</span>
    <span class="col">${price}</span>
    <span class="col">${esc(c.language || '–')}</span>
    <div class="list-actions" onclick="event.stopPropagation()">
      <button class="icon-btn" onclick="openModal(${idx})" title="Details">👁</button>
      <button class="icon-btn danger" onclick="deleteCard(${idx})" title="Löschen">🗑</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════
function openModal(idx) {
  editingIndex = idx;
  const c = allCards[idx];
  const img = scryfallImgUrl(c);
  const rc = rarityClass(c.rarity);
  const price = c.purchase_price ? `${parseFloat(c.purchase_price).toFixed(2)} ${c.currency}` : '–';

  document.getElementById('modalInner').innerHTML = `
    <div class="modal-img-side">
      ${img
        ? `<img src="${img}" alt="${esc(c.name)}">`
        : `<div class="modal-img-placeholder">🃏</div>`}
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:0.25rem">
        ${c.foil === 'foil' ? '<span class="badge badge-foil">✦ FOIL</span>' : ''}
        ${c.misprint ? '<span class="badge badge-misprint">⚠ MISPRINT</span>' : ''}
        ${c.altered ? '<span class="badge badge-altered">✎ ALTERED</span>' : ''}
      </div>
      ${c.scryfall_id ? `<a href="https://scryfall.com/card/${c.set_code.toLowerCase()}/${c.collector_number}" target="_blank" style="font-size:0.75rem;color:var(--accent3);text-decoration:none;margin-top:0.5rem">🔗 Scryfall ansehen</a>` : ''}
    </div>
    <div class="modal-detail">
      <div class="modal-title">${esc(c.name)}</div>
      <div class="modal-set">${esc(c.set_name || c.set_code)} · ${esc(c.set_code)} · #${esc(c.collector_number)}</div>
      <div class="detail-grid">
        <div class="detail-item"><label>SELTENHEIT</label><div class="val" style="text-transform:capitalize;color:var(--${rc})">${esc(c.rarity)}</div></div>
        <div class="detail-item"><label>ANZAHL</label><div class="val">×${c.quantity}</div></div>
        <div class="detail-item"><label>ZUSTAND</label><div class="val"><span class="condition-badge ${condClass(c.condition)}">${condLabel(c.condition)}</span></div></div>
        <div class="detail-item"><label>SPRACHE</label><div class="val">${esc(c.language || '–')}</div></div>
        <div class="detail-item"><label>KAUFPREIS</label><div class="val">${price}</div></div>
        <div class="detail-item"><label>FOIL</label><div class="val">${c.foil === 'foil' ? '✦ Foil' : 'Normal'}</div></div>
        <div class="detail-item"><label>SCRYFALL ID</label><div class="val" style="font-size:0.72rem;word-break:break-all;color:var(--text-muted)">${esc(c.scryfall_id || '–')}</div></div>
        <div class="detail-item"><label>MANABOX ID</label><div class="val" style="color:var(--text-muted)">${esc(c.manabox_id || '–')}</div></div>
      </div>
      <details style="margin-bottom:1rem">
        <summary style="font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.08em;color:var(--text-muted);cursor:pointer;margin-bottom:0.75rem">✎ BEARBEITEN</summary>
        <div class="edit-form" id="editForm">
          <div><label>NAME</label><input id="e_name" value="${esc(c.name)}"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem">
            <div><label>ANZAHL</label><input id="e_qty" type="number" min="1" value="${c.quantity}"></div>
            <div><label>KAUFPREIS</label><input id="e_price" value="${esc(c.purchase_price || '')}"></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem">
            <div><label>ZUSTAND</label>
              <select id="e_cond">
                ${['near_mint','lightly_played','moderately_played','heavily_played','damaged'].map(v =>
                  `<option value="${v}" ${c.condition===v?'selected':''}>${v.replace('_',' ')}</option>`
                ).join('')}
              </select>
            </div>
            <div><label>FOIL</label>
              <select id="e_foil">
                <option value="normal" ${c.foil!=='foil'?'selected':''}>Normal</option>
                <option value="foil" ${c.foil==='foil'?'selected':''}>Foil</option>
              </select>
            </div>
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" onclick="saveEdit()">Speichern</button>
            <button class="btn btn-danger" onclick="deleteCard(${idx})">Löschen</button>
          </div>
        </div>
      </details>
    </div>
  `;
  document.getElementById('cardModal').classList.add('open');
}

function closeModal() {
  document.getElementById('cardModal').classList.remove('open');
  editingIndex = null;
}

document.getElementById('cardModal').addEventListener('click', e => {
  if (e.target === document.getElementById('cardModal')) closeModal();
});

function saveEdit() {
  if (editingIndex === null) return;
  allCards[editingIndex] = {
    ...allCards[editingIndex],
    name: document.getElementById('e_name').value.trim(),
    quantity: parseInt(document.getElementById('e_qty').value) || 1,
    purchase_price: document.getElementById('e_price').value.trim(),
    condition: document.getElementById('e_cond').value,
    foil: document.getElementById('e_foil').value,
  };
  save();
  closeModal();
  renderAll();
  showToast('✓ Karte gespeichert');
}

function deleteCard(idx) {
  if (!confirm('Karte wirklich löschen?')) return;
  allCards.splice(idx, 1);
  save();
  closeModal();
  renderAll();
  showToast('Karte gelöscht');
}

// ═══════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════
function renderStats() {
  const sc = document.getElementById('stats-content');
  if (allCards.length === 0) { sc.style.display='none'; return; }
  sc.style.display = '';

  const total = allCards.reduce((s,c) => s+c.quantity, 0);
  const unique = allCards.length;
  const totalVal = allCards.reduce((s,c) => s+(parseFloat(c.purchase_price)||0)*c.quantity, 0);
  const foilCount = allCards.filter(c=>c.foil==='foil').reduce((s,c)=>s+c.quantity,0);
  const sets = new Set(allCards.map(c=>c.set_code)).size;

  // Rarity
  const rarityCount = {};
  allCards.forEach(c => { rarityCount[c.rarity] = (rarityCount[c.rarity]||0) + c.quantity; });
  const rarityOrder = ['mythic','rare','uncommon','common'];
  const rarityColors = { mythic:'var(--mythic)', rare:'var(--rare)', uncommon:'var(--uncommon)', common:'var(--text-muted)' };
  const maxRarity = Math.max(...Object.values(rarityCount));

  // Mana curve (by collector number heuristic – just show set distribution)
  const setCounts = {};
  allCards.forEach(c => { setCounts[c.set_code] = (setCounts[c.set_code]||0) + c.quantity; });
  const topSets = Object.entries(setCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxSet = Math.max(...topSets.map(s=>s[1]));

  // Language
  const langCount = {};
  allCards.forEach(c => { const l = c.language||'Unbekannt'; langCount[l] = (langCount[l]||0)+c.quantity; });
  const topLangs = Object.entries(langCount).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxLang = Math.max(...topLangs.map(l=>l[1]));

  // Condition
  const condCount = {};
  allCards.forEach(c => { const l = c.condition||'Unbekannt'; condCount[l] = (condCount[l]||0)+c.quantity; });

  sc.innerHTML = `
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-val">${total.toLocaleString('de')}</div><div class="kpi-label">Karten gesamt</div></div>
    <div class="kpi"><div class="kpi-val">${unique.toLocaleString('de')}</div><div class="kpi-label">Einträge / Drucke</div></div>
    <div class="kpi"><div class="kpi-val">${sets}</div><div class="kpi-label">Sets</div></div>
    <div class="kpi"><div class="kpi-val">${foilCount.toLocaleString('de')}</div><div class="kpi-label">Foil-Karten</div></div>
    <div class="kpi"><div class="kpi-val" style="font-size:1.3rem">${totalVal.toFixed(2)} €</div><div class="kpi-label">Gesamtwert (Kaufpreise)</div></div>
  </div>

  <div class="stats-section">
    <h2>◈ SELTENHEIT</h2>
    <div class="bar-chart">
      ${rarityOrder.filter(r=>rarityCount[r]).map(r=>`
        <div class="bar-row">
          <span class="bar-label" style="text-transform:capitalize;color:${rarityColors[r]}">${r}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${(rarityCount[r]/maxRarity*100).toFixed(1)}%;background:${rarityColors[r]}">
              ${rarityCount[r]}
            </div>
          </div>
        </div>`).join('')}
    </div>
  </div>

  <div class="stats-section">
    <h2>◈ TOP SETS</h2>
    <div class="bar-chart">
      ${topSets.map(([code,cnt])=>`
        <div class="bar-row">
          <span class="bar-label">${code}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${(cnt/maxSet*100).toFixed(1)}%;background:var(--accent2)">
              ${cnt}
            </div>
          </div>
        </div>`).join('')}
    </div>
  </div>

  <div class="stats-section">
    <h2>◈ SPRACHEN</h2>
    <div class="bar-chart">
      ${topLangs.map(([lang,cnt])=>`
        <div class="bar-row">
          <span class="bar-label">${lang}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${(cnt/maxLang*100).toFixed(1)}%;background:var(--accent3)">
              ${cnt}
            </div>
          </div>
        </div>`).join('')}
    </div>
  </div>

  <div class="stats-section">
    <h2>◈ ZUSTAND</h2>
    <div class="bar-chart">
      ${Object.entries(condCount).sort((a,b)=>b[1]-a[1]).map(([cond,cnt])=>`
        <div class="bar-row">
          <span class="bar-label" style="font-size:0.78rem">${condLabel(cond)}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${(cnt/total*100).toFixed(1)}%;background:var(--success)">
              ${cnt} (${(cnt/total*100).toFixed(0)}%)
            </div>
          </div>
        </div>`).join('')}
    </div>
  </div>
  `;
}

// ═══════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach((t,i) => {
    t.classList.toggle('active', ['collection','stats'][i] === name);
  });
  if (name === 'stats') renderStats();
}

function setViewMode(mode) {
  viewMode = mode;
  document.getElementById('viewGrid').classList.toggle('active', mode==='grid');
  document.getElementById('viewList').classList.toggle('active', mode==='list');
  renderCards();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
load();
</script>
