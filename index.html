<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<title>MTG-Vault</title>

<style>
body { font-family: Arial; background:#111; color:#eee; padding:10px; }
button { padding:10px; margin:5px; border:2px solid #555; background:#222; color:#eee; }
video { width:100%; max-width:420px; }
.tab { display:none; }
.active { display:block; }
.card { border:1px solid #444; padding:10px; margin:5px 0; display:flex; gap:10px; align-items:center;}
.card img { width:60px; }
.removeBtn { margin-left:auto; background:#400; }
.status { color:#0f0; margin-bottom:5px; }
.flash { position:absolute; inset:0; background:rgba(0,255,0,0.3); opacity:0; }
.flash.active { opacity:1; }
</style>
</head>

<body>

<h1>MTG-Vault</h1>

<button onclick="showTab('scan')">📷 Scannen</button>
<button onclick="showTab('collection')">🗂 Sammlung</button>

<div id="scan" class="tab active">
  <div id="status" class="status">Initialisiere...</div>
  <video id="video" autoplay playsinline></video>
  <button onclick="manualScan()">📸 Scannen</button>
</div>

<div id="collection" class="tab">
  <h2>Sammlung</h2>
  <button onclick="clearCollection()">🧹 Alles löschen</button>
  <div id="collectionList"></div>
</div>

<footer id="versionFooter" style="margin-top:20px; font-size:12px; opacity:0.6;"></footer>

<script>

/* =========================================
   🔹 MODULE: CONFIG
========================================= */
const CONFIG = {
  version: "0.30",
  scanCooldown: 2000,
  ocrConfidence: 50
};

/* =========================================
   🔹 MODULE: STATE
========================================= */
let video = document.getElementById('video');
let statusDiv = document.getElementById('status');

let collection = JSON.parse(localStorage.getItem('mtgCollection')) || {};

let lastScanTime = 0;
let lastCard = null;

/* =========================================
   🔹 MODULE: STORAGE
========================================= */
function save(){
  localStorage.setItem('mtgCollection', JSON.stringify(collection));
  render();
}

function clearCollection(){
  localStorage.removeItem('mtgCollection');
  collection = {};
  render();
}

/* =========================================
   🔹 MODULE: UI
========================================= */
function showTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  if(tab==='scan') startCamera();
  render();
}

function render(){
  let div = document.getElementById('collectionList');
  div.innerHTML = '';

  for(let name in collection){
    let c = collection[name];
    div.innerHTML += `
    <div class="card">
      <img src="${c.image}">
      <div><b>${name}</b><br>x${c.count}</div>
      <button class="removeBtn" onclick="removeCard('${name}')">❌</button>
    </div>`;
  }
}

function removeCard(name){
  if(!collection[name]) return;
  collection[name].count--;
  if(collection[name].count<=0) delete collection[name];
  save();
}

/* =========================================
   🔹 MODULE: CAMERA
========================================= */
async function startCamera(){
  if(video.srcObject) return;

  let stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:'environment'}
  });

  video.srcObject = stream;

  await new Promise(res => video.onloadedmetadata = res);

  statusDiv.innerText = "📷 Kamera bereit";
}

/* =========================================
   🔹 MODULE: OCR
========================================= */
function preprocess(canvas){
  let ctx = canvas.getContext('2d');
  let img = ctx.getImageData(0,0,canvas.width,canvas.height);
  let d = img.data;

  for(let i=0;i<d.length;i+=4){
    let avg=(d[i]+d[i+1]+d[i+2])/3;
    let v=avg>140?255:0;
    d[i]=d[i+1]=d[i+2]=v;
  }

  ctx.putImageData(img,0,0);
}

function clean(text){
  return text
    .replace(/[^a-zA-Z ]/g,'')
    .split('\n')
    .map(t=>t.trim())
    .filter(t=>t.length>2);
}

/* =========================================
   🔹 MODULE: SCANNER (STABIL)
========================================= */
async function manualScan(){

  let now = Date.now();
  if(now - lastScanTime < CONFIG.scanCooldown){
    statusDiv.innerText = "⏳ Bitte kurz warten...";
    return;
  }

  if(!video.srcObject || video.readyState < 2){
    statusDiv.innerText = "⏳ Kamera nicht bereit";
    return;
  }

  lastScanTime = now;

  statusDiv.innerText = "🔍 Scanne...";

  let canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  let ctx = canvas.getContext('2d');
  ctx.drawImage(video,0,0);

  // nur obere 20%
  let part = document.createElement('canvas');
  let h = canvas.height * 0.2;

  part.width = canvas.width;
  part.height = h;

  part.getContext('2d')
    .drawImage(canvas,0,0,canvas.width,h,0,0,canvas.width,h);

  preprocess(part);

  try{
    let res = await Tesseract.recognize(part.toDataURL(),'eng');

    if(res.data.confidence < CONFIG.ocrConfidence){
      statusDiv.innerText = "⚠️ Unsicher";
      return;
    }

    let words = clean(res.data.text);

    if(words.length === 0){
      statusDiv.innerText = "⚠️ Kein Text erkannt";
      return;
    }

    let guess = words[0];

    let r = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(guess)}`);
    let d = await r.json();

    if(d.object === 'error'){
      statusDiv.innerText = "❌ Kein Treffer";
      return;
    }

    if(d.name === lastCard){
      statusDiv.innerText = "⏭ Bereits erkannt";
      return;
    }

    lastCard = d.name;

    let img = d.image_uris?.small || d.card_faces?.[0]?.image_uris?.small;

    if(!collection[d.name]){
      collection[d.name] = {count:0,image:img};
    }

    collection[d.name].count++;
    save();

    statusDiv.innerText = "✅ " + d.name;

  } catch(e){
    console.error(e);
    statusDiv.innerText = "❌ Fehler beim Scannen";
  }
}

/* ========================================= */

startCamera();
render();

document.getElementById("versionFooter").innerText =
  "Version " + CONFIG.version + " ©to";

</script>
</body>
</html>
