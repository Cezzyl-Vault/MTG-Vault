<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTG Scanner Ultimate UX+</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { font-family: Arial; background:#111; color:#eee; padding:10px; }
    button { padding:10px; margin:5px; }
    video, canvas { width:100%; max-width:400px; }
    .tab { display:none; }
    .active { display:block; }
    .card { border:1px solid #444; padding:10px; margin:5px 0; display:flex; align-items:center; }
    .card img { width:60px; margin-right:10px; }
    #status { margin-top:10px; color:#0f0; }

    .camera-container { position: relative; display:inline-block; }
    .scan-box {
      position: absolute;
      top: 10%;
      left: 5%;
      width: 90%;
      height: 20%;
      border: 2px solid lime;
      pointer-events: none;
    }
  </style>
</head>
<body>

<h1>MTG Scanner Ultimate UX+ 🚀</h1>

<button onclick="showTab('scan')">📷 Scannen</button>
<button onclick="showTab('collection')">🗂 Sammlung</button>

<div id="scan" class="tab active">
  <button onclick="startCamera()">Kamera starten</button>
  <button onclick="toggleLiveScan()">Live-Scan EIN/AUS</button>
  <br><br>

  <div class="camera-container">
    <video id="video" autoplay playsinline></video>
    <div class="scan-box"></div>
  </div>

  <canvas id="canvas" style="display:none;"></canvas>
  <div id="status"></div>
</div>

<div id="collection" class="tab">
  <h2>Sammlung</h2>
  <div id="collectionList"></div>
</div>

<script>
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let statusDiv = document.getElementById('status');

let collection = JSON.parse(localStorage.getItem('mtgCollection')) || {};
let live = false;
let scanning = false;
let lastScan = 0;
let lastCard = null;

function save() {
  localStorage.setItem('mtgCollection', JSON.stringify(collection));
  render();
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  render();
}

function render() {
  let div = document.getElementById('collectionList');
  div.innerHTML = '';
  for (let name in collection) {
    let c = collection[name];
    div.innerHTML += `<div class="card"><img src="${c.image}"><div><b>${name}</b><br>x${c.count}</div></div>`;
  }
}

async function startCamera() {
  try {
    let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video.srcObject = stream;
    statusDiv.innerText = "Kamera läuft";
  } catch {
    statusDiv.innerText = "Kamera Fehler (HTTPS nötig)";
  }
}

function preprocess(canvasEl) {
  let ctx = canvasEl.getContext('2d');
  let img = ctx.getImageData(0, 0, canvasEl.width, canvasEl.height);
  let d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    let avg = (d[i]+d[i+1]+d[i+2])/3;
    let val = avg > 140 ? 255 : 0;
    d[i]=d[i+1]=d[i+2]=val;
  }
  ctx.putImageData(img,0,0);
}

function clean(text) {
  return text.replace(/[^a-zA-Z' ]/g,'')
    .split('\n')
    .map(l=>l.trim())
    .filter(l=>l.length>2);
}

async function multiOCR() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video,0,0);

  let candidates = [];

  for (let i=0;i<3;i++) {
    let cropY = canvas.height*(0.1+i*0.03);
    let cropH = canvas.height*0.15;

    let img = ctx.getImageData(0,cropY,canvas.width,cropH);

    let temp=document.createElement('canvas');
    temp.width=canvas.width;
    temp.height=cropH;
    let tctx=temp.getContext('2d');
    tctx.putImageData(img,0,0);

    preprocess(temp);

    let res = await Tesseract.recognize(temp.toDataURL(),'eng');

    if (res.data.confidence < 50) continue;

    let lines = clean(res.data.text);
    candidates.push(...lines);
  }

  return candidates;
}

async function matchCandidates(candidates) {
  for (let c of candidates) {
    try {
      let res = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(c)}`);
      let data = await res.json();
      if (data.object !== "error") return data;
    } catch {}
  }
  return null;
}

async function scanOnce() {
  if (scanning) return;

  let now = Date.now();
  if (now - lastScan < 2000) return; // throttle

  scanning = true;
  lastScan = now;

  statusDiv.innerText = "Scanne...";

  let candidates = await multiOCR();

  let freq={};
  candidates.forEach(c=>freq[c]=(freq[c]||0)+1);
  let sorted = Object.keys(freq).sort((a,b)=>freq[b]-freq[a]);

  let result = await matchCandidates(sorted);

  if (result) {
    let name=result.name;

    // Scan-Stop Logik
    if (name === lastCard) {
      scanning = false;
      return;
    }

    lastCard = name;

    let image=result.image_uris?.small || result.card_faces?.[0]?.image_uris?.small;

    if (!collection[name]) collection[name]={count:0,image:image};
    collection[name].count++;

    save();
    statusDiv.innerText = "✅ " + name;
  } else {
    statusDiv.innerText = "❌ Kein Treffer";
  }

  scanning = false;
}

function toggleLiveScan() {
  live = !live;
  if (live) loop();
}

async function loop() {
  if (!live) return;
  await scanOnce();
  requestAnimationFrame(loop);
}

render();
</script>

</body>
</html>
