<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG-Vault</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script async src="https://docs.opencv.org/4.x/opencv.js"></script>

<style>
body { font-family: Arial; background:#111; color:#eee; padding:10px; }
button { padding:10px; margin:5px; border:2px solid #555; background:#222; color:#eee; }
video, canvas { width:100%; max-width:420px; }
.tab { display:none; }
.active { display:block; }
.card { border:1px solid #444; padding:10px; margin:5px 0; display:flex; gap:10px; align-items:center;}
.card img { width:60px; }
.removeBtn { margin-left:auto; background:#400; }
.camera-container { position:relative; }
.scan-box { position:absolute; top:5%; left:5%; width:90%; height:90%; border:2px solid rgba(0,255,0,0.5);}
.status { color:#0f0; margin-bottom:5px; }
.flash { position:absolute; inset:0; background:rgba(0,255,0,0.3); opacity:0; }
.flash.active { opacity:1; }
</style>
</head>

<body>

<h1>MTG-Vault</h1>

<button onclick="showTab('scan')">📷 Scannen</button>
<button onclick="showTab('collection')">🗂 Sammlung</button>

<div id="scan" class="tab active">
  <div id="status" class="status">Initialisiere...</div>
  <div class="camera-container">
    <video id="video" autoplay playsinline></video>
    <canvas id="motionCanvas" style="display:none"></canvas>
    <div class="scan-box"></div>
    <div id="flash" class="flash"></div>
  </div>
</div>

<div id="collection" class="tab">
  <h2>Sammlung</h2>
  <button onclick="clearCollection()">🧹 Alles löschen</button>
  <div id="collectionList"></div>
</div>

<footer id="versionFooter" style="margin-top:20px; font-size:12px; opacity:0.6;">
</footer>
  
<script>

/* =========================================
   🔹 MODULE: CONFIG
========================================= */
const CONFIG = {
  version: "0.18",
  scanInterval: 1200,
  motionThreshold: 50000,
  ocrConfidence: 40,
  scanZones: [0.08, 0.1, 0.12]
};

/* =========================================
   🔹 MODULE: STATE
========================================= */
let video = document.getElementById('video');
let motionCanvas = document.getElementById('motionCanvas');
let statusDiv = document.getElementById('status');
let flash = document.getElementById('flash');

let collection = JSON.parse(localStorage.getItem('mtgCollection')) || {};
let scanning = false;
let lastCard = null;
let lastFrame = null;
let cameraStarted = false;
let loopRunning = false;

/* =========================================
   🔹 MODULE: STORAGE
========================================= */
function save(){
  localStorage.setItem('mtgCollection', JSON.stringify(collection));
  render();
}

function clearCollection(){
  localStorage.removeItem('mtgCollection');
  collection = {};
  render();
}

/* =========================================
   🔹 MODULE: UI
========================================= */
function showTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  if(tab==='scan') startCamera();
  render();
}

function render(){
  let div = document.getElementById('collectionList');
  div.innerHTML = '';
  for(let name in collection){
    let c = collection[name];
    div.innerHTML += `
    <div class="card">
      <img src="${c.image}">
      <div><b>${name}</b><br>x${c.count}</div>
      <button class="removeBtn" onclick="removeCard('${name}')">❌</button>
    </div>`;
  }
}

function removeCard(name){
  if(!collection[name]) return;
  collection[name].count--;
  if(collection[name].count<=0) delete collection[name];
  save();
}

/* =========================================
   🔹 MODULE: CAMERA
========================================= */
async function startCamera(){
  if(cameraStarted) return;
  cameraStarted = true;

  let stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
  video.srcObject = stream;

  if(!loopRunning){
    loopRunning = true;
    loop();
  }
}

/* =========================================
   🔹 MODULE: OCR
========================================= */
function preprocess(canvas){
  let ctx = canvas.getContext('2d');
  let img = ctx.getImageData(0,0,canvas.width,canvas.height);
  let d = img.data;

  for(let i=0;i<d.length;i+=4){
    let avg=(d[i]+d[i+1]+d[i+2])/3;
    let v=avg>140?255:0;
    d[i]=d[i+1]=d[i+2]=v;
  }
  ctx.putImageData(img,0,0);
}

function clean(text){
  return [...new Set(
    text.replace(/[^a-zA-Z ]/g,'')
      .split('\n')
      .map(l=>l.trim())
      .filter(l=>l.length>2)
  )];
}

/* =========================================
   🔹 MODULE: MATCHING
========================================= */
function levenshtein(a,b){
  let m=[];
  for(let i=0;i<=b.length;i++){ m[i]=[i]; }
  for(let j=0;j<=a.length;j++){ m[0][j]=j; }
  for(let i=1;i<=b.length;i++){
    for(let j=1;j<=a.length;j++){
      m[i][j]=b[i-1]==a[j-1]?m[i-1][j-1]:
      Math.min(m[i-1][j-1]+1,m[i][j-1]+1,m[i-1][j]+1);
    }
  }
  return m[b.length][a.length];
}

function bestMatch(input, candidates){
  let best=null, bestScore=Infinity;
  for(let c of candidates){
    let score=levenshtein(input.toLowerCase(), c.toLowerCase());
    if(score<bestScore){
      bestScore=score;
      best=c;
    }
  }
  return best;
}

/* =========================================
   🔹 MODULE: MOTION
========================================= */
function detectMotion(){
  let ctx = motionCanvas.getContext('2d');
  motionCanvas.width = video.videoWidth;
  motionCanvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);
  let frame = ctx.getImageData(0,0,motionCanvas.width,motionCanvas.height).data;

  if(!lastFrame){
    lastFrame = frame;
    return true;
  }

  let diff=0;
  for(let i=0;i<frame.length;i+=20){
    diff += Math.abs(frame[i]-lastFrame[i]);
  }

  lastFrame = frame;
  return diff > CONFIG.motionThreshold;
}

/* =========================================
   🔹 MODULE: SCANNER (OpenCV Perspektivkorrektur)
========================================= */

function detectCardContour(src) {
  let gray = new cv.Mat();
  let blur = new cv.Mat();
  let edges = new cv.Mat();

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.GaussianBlur(gray, blur, new cv.Size(5,5), 0);
  cv.Canny(blur, edges, 50, 150);

  let contours = new cv.MatVector();
  let hierarchy = new cv.Mat();

  cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

  let maxArea = 0;
  let bestContour = null;

  for (let i = 0; i < contours.size(); i++) {
    let cnt = contours.get(i);
    let area = cv.contourArea(cnt);

    if (area > maxArea) {
      let peri = cv.arcLength(cnt, true);
      let approx = new cv.Mat();
      cv.approxPolyDP(cnt, approx, 0.02 * peri, true);

      if (approx.rows === 4) {
        maxArea = area;
        bestContour = approx;
      }
    }
  }

  gray.delete(); blur.delete(); edges.delete();
  contours.delete(); hierarchy.delete();

  return bestContour;
}

function warpCard(src, contour) {
  let pts = contour.data32S;

  let srcTri = cv.matFromArray(4,1,cv.CV_32FC2,[
    pts[0], pts[1],
    pts[2], pts[3],
    pts[4], pts[5],
    pts[6], pts[7]
  ]);

  let width = 300;
  let height = 420;

  let dstTri = cv.matFromArray(4,1,cv.CV_32FC2,[
    0,0,
    width,0,
    width,height,
    0,height
  ]);

  let M = cv.getPerspectiveTransform(srcTri, dstTri);
  let dst = new cv.Mat();

  cv.warpPerspective(src, dst, M, new cv.Size(width, height));

  srcTri.delete(); dstTri.delete(); M.delete();

  return dst;
}

async function scanOnce(){

  if (scanning) return;

  if (typeof cv === 'undefined') {
    statusDiv.innerText = "⏳ OpenCV lädt...";
    return;
  }

  if (video.videoWidth === 0) {
    statusDiv.innerText = "⏳ Kamera lädt...";
    return;
  }

  if (!detectMotion()) {
    statusDiv.innerText = "⏸ Keine Bewegung";
    return;
  }

  scanning = true;

  let canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  let ctx = canvas.getContext('2d');
  ctx.drawImage(video,0,0);

  let src = cv.imread(canvas);

  let contour = detectCardContour(src);

  if (!contour) {
    statusDiv.innerText = "⚠️ Keine Karte erkannt";
    src.delete();
    scanning = false;
    return;
  }

  let warped = warpCard(src, contour);

  // convert zurück zu Canvas
  let outCanvas = document.createElement('canvas');
  cv.imshow(outCanvas, warped);

  // OCR nur obere Zone
  let part = document.createElement('canvas');
  let h = outCanvas.height * 0.2;

  part.width = outCanvas.width;
  part.height = h;

  part.getContext('2d').drawImage(outCanvas, 0, 0, outCanvas.width, h, 0, 0, outCanvas.width, h);

  preprocess(part);

  try {
    let res = await Tesseract.recognize(part.toDataURL(),'eng');

    if (res.data.confidence < CONFIG.ocrConfidence) {
      statusDiv.innerText = "⚠️ Unsicher";
      scanning = false;
      return;
    }

    let candidates = clean(res.data.text || "");
    if (candidates.length === 0) {
      scanning = false;
      return;
    }

    let guess = bestMatch(candidates[0], candidates);

    let r = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(guess)}`);
    let d = await r.json();

    if (d.object === 'error') {
      statusDiv.innerText = "❌ Kein Treffer";
      scanning = false;
      return;
    }

    if (d.name === lastCard) {
      scanning = false;
      return;
    }

    lastCard = d.name;
    setTimeout(()=>lastCard=null,3000);

    let img = d.image_uris?.small || d.card_faces?.[0]?.image_uris?.small;

    if (!collection[d.name]) {
      collection[d.name] = {count:0,image:img};
    }

    collection[d.name].count++;
    save();

    statusDiv.innerText = "✅ " + d.name;

    flash.classList.add('active');
    setTimeout(()=>flash.classList.remove('active'),200);

  } catch(e) {
    console.error(e);
  }

  src.delete();
  warped.delete();

  scanning = false;
}

async function loop(){
  await scanOnce();
  setTimeout(loop, CONFIG.scanInterval);
}
  
/* ========================================= */

startCamera();
render();

 document.getElementById("versionFooter").innerText =
  "Version " + CONFIG.version + " ©to";  
  
</script>
</body>
</html>
