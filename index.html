<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTG Scanner Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { font-family: Arial; background:#111; color:#eee; padding:10px; }
    button { padding:10px; margin:5px; }
    video, canvas { width:100%; max-width:400px; }
    .tab { display:none; }
    .active { display:block; }
    .card { border:1px solid #444; padding:10px; margin:5px 0; display:flex; align-items:center; }
    .card img { width:60px; margin-right:10px; }
    #status { margin-top:10px; color:#0f0; }
  </style>
</head>
<body>

<h1>MTG Scanner Pro</h1>

<button onclick="showTab('scan')">📷 Scannen</button>
<button onclick="showTab('collection')">🗂 Sammlung</button>

<div id="scan" class="tab active">
  <button onclick="startCamera()">Kamera starten</button>
  <button onclick="capture()">Scannen</button>
  <br><br>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <div id="status"></div>
</div>

<div id="collection" class="tab">
  <h2>Sammlung</h2>
  <div id="collectionList"></div>
</div>

<script>
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let statusDiv = document.getElementById('status');

let collection = JSON.parse(localStorage.getItem('mtgCollection')) || {};

function save() {
  localStorage.setItem('mtgCollection', JSON.stringify(collection));
  render();
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  render();
}

function render() {
  let div = document.getElementById('collectionList');
  div.innerHTML = '';

  for (let name in collection) {
    let card = collection[name];
    div.innerHTML += `
      <div class="card">
        <img src="${card.image}" />
        <div>
          <b>${name}</b><br>
          x${card.count}
        </div>
      </div>`;
  }
}

async function startCamera() {
  try {
    let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video.srcObject = stream;
    statusDiv.innerText = "Kamera läuft";
  } catch (err) {
    statusDiv.innerText = "Kamera Fehler (HTTPS nötig)";
  }
}

async function capture() {
  statusDiv.innerText = "Scanne Titelbereich...";

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  // 👉 nur oberen Bereich (Titel)
  let cropHeight = canvas.height * 0.25;
  let imageData = ctx.getImageData(0, 0, canvas.width, cropHeight);

  let tempCanvas = document.createElement('canvas');
  tempCanvas.width = canvas.width;
  tempCanvas.height = cropHeight;
  tempCanvas.getContext('2d').putImageData(imageData, 0, 0);

  let dataURL = tempCanvas.toDataURL('image/png');

  const result = await Tesseract.recognize(dataURL, 'eng', {
    logger: m => statusDiv.innerText = m.status
  });

  let text = result.data.text;
  let lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 2);
  let guessedName = lines[0];

  statusDiv.innerText = "Suche: " + guessedName;

  try {
    let res = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(guessedName)}`);
    let data = await res.json();

    if (data.object === "error") throw new Error();

    let name = data.name;
    let image = data.image_uris?.small || data.card_faces?.[0]?.image_uris?.small;

    if (!collection[name]) {
      collection[name] = { count: 0, image: image };
    }

    collection[name].count++;

    save();
    statusDiv.innerText = "✅ " + name + " hinzugefügt";

  } catch {
    statusDiv.innerText = "❌ Karte nicht erkannt – nicht gespeichert";
  }
}

render();
</script>

</body>
</html>
