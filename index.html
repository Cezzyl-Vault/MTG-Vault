<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTG-Vault DEBUG</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { font-family: Arial; background:#111; color:#eee; padding:10px; }
    video, canvas { width:100%; max-width:400px; margin-top:10px; }
    #debug { font-size:12px; margin-top:10px; background:#222; padding:10px; }
  </style>
</head>
  <footer>Version 0.8</footer>
<body>

<h1>MTG-Vault DEBUG</h1>
<div id="status">Starte...</div>

<video id="video" autoplay playsinline></video>
<canvas id="preview"></canvas>

<div id="debug"></div>

<script>
let video = document.getElementById('video');
let preview = document.getElementById('preview');
let statusDiv = document.getElementById('status');
let debugDiv = document.getElementById('debug');

let scanning = false;

async function startCamera() {
  try {
    let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video.srcObject = stream;
    statusDiv.innerText = "📷 Kamera läuft";
    loop();
  } catch {
    statusDiv.innerText = "❌ Kamera Fehler";
  }
}

function preprocess(canvas) {
  let ctx = canvas.getContext('2d');
  let img = ctx.getImageData(0,0,canvas.width,canvas.height);
  let d = img.data;
  for (let i=0;i<d.length;i+=4){
    let avg=(d[i]+d[i+1]+d[i+2])/3;
    let val=avg>140?255:0;
    d[i]=d[i+1]=d[i+2]=val;
  }
  ctx.putImageData(img,0,0);
}

function clean(text){
  return text.replace(/[^a-zA-Z' ]/g,'')
    .split('\n')
    .map(l=>l.trim())
    .filter(l=>l.length>2);
}

async function scanOnce(){
  if (scanning) return;

  if (video.videoWidth === 0) {
    statusDiv.innerText = "⏳ Kamera lädt...";
    return;
  }

  scanning = true;

  let canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  let ctx = canvas.getContext('2d');
  ctx.drawImage(video,0,0);

  // 👉 Titelbereich
  let cropY = canvas.height * 0.1;
  let cropH = canvas.height * 0.2;

  let part = document.createElement('canvas');
  part.width = canvas.width;
  part.height = cropH;
  let pctx = part.getContext('2d');
  pctx.drawImage(canvas,0,cropY,canvas.width,cropH,0,0,canvas.width,cropH);

  preprocess(part);

  // 👉 Vorschau anzeigen
  preview.width = part.width;
  preview.height = part.height;
  preview.getContext('2d').drawImage(part,0,0);

  statusDiv.innerText = "🔍 OCR läuft...";

  try {
    let res = await Tesseract.recognize(part.toDataURL(),'eng');

    let text = res.data.text;
    let confidence = res.data.confidence;

    let cleaned = clean(text);

    debugDiv.innerHTML = `
      <b>Confidence:</b> ${confidence}<br>
      <b>Raw Text:</b><br>${text}<br><br>
      <b>Cleaned:</b><br>${cleaned.join('<br>')}
    `;

    if (cleaned.length === 0) {
      statusDiv.innerText = "⚠️ Kein Text erkannt";
      scanning = false;
      return;
    }

    let guess = cleaned[0];

    statusDiv.innerText = "🔎 Suche: " + guess;

    let r = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(guess)}`);
    let data = await r.json();

    if (data.object !== "error") {
      statusDiv.innerText = "✅ Treffer: " + data.name;
    } else {
      statusDiv.innerText = "❌ Kein Treffer";
    }

  } catch (e) {
    statusDiv.innerText = "❌ OCR Fehler";
  }

  scanning = false;
}

async function loop(){
  await scanOnce();
  setTimeout(loop,2000);
}

startCamera();
</script>

</body>
</html>
