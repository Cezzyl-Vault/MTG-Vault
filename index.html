<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTG-Vault</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    body { font-family: Arial; background:#111; color:#eee; padding:10px; }
    button { padding:10px; margin:5px; border:2px solid #555; background:#222; color:#eee; }
    button.activeBtn { border-color:lime; }
    video { width:100%; max-width:420px; }
    .tab { display:none; }
    .active { display:block; }

    .card {
      border:1px solid #444;
      padding:10px;
      margin:5px 0;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .card img { width:60px; }

    .removeBtn {
      margin-left:auto;
      background:#400;
      border:1px solid #800;
      color:#fff;
      cursor:pointer;
      padding:5px 8px;
    }

    .camera-container { position: relative; display:inline-block; }

    .scan-box {
      position:absolute;
      top:5%; left:5%;
      width:90%; height:90%;
      border:2px solid rgba(0,255,0,0.5);
      pointer-events:none;
    }

    .status { margin-bottom:5px; color:#0f0; }

    .flash {
      position:absolute;
      top:0; left:0; right:0; bottom:0;
      background:rgba(0,255,0,0.3);
      opacity:0;
      pointer-events:none;
    }

    .flash.active { opacity:1; }

    footer { margin-top:20px; font-size:12px; opacity:0.6; }
  </style>
</head>
<body>

<h1>MTG-Vault</h1>

<button id="btnScan" onclick="showTab('scan')">📷 Scannen</button>
<button id="btnCollection" onclick="showTab('collection')">🗂 Sammlung</button>

<div id="scan" class="tab active">
  <div class="status" id="status">Initialisiere Kamera...</div>

  <div class="camera-container">
    <video id="video" autoplay playsinline></video>
    <div class="scan-box"></div>
    <div id="flash" class="flash"></div>
  </div>
</div>

<div id="collection" class="tab">
  <h2>Sammlung</h2>
  <div id="collectionList"></div>
</div>

<footer>Version 0.10</footer>

<script>
let video = document.getElementById('video');
let statusDiv = document.getElementById('status');
let flash = document.getElementById('flash');

let collection = JSON.parse(localStorage.getItem('mtgCollection')) || {};
let scanning = false;
let lastCard = null;

function save() {
  localStorage.setItem('mtgCollection', JSON.stringify(collection));
  render();
}

function removeCard(name) {
  if (!collection[name]) return;

  collection[name].count--;

  if (collection[name].count <= 0) {
    delete collection[name];
  }

  save();
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');

  document.getElementById('btnScan').classList.toggle('activeBtn', tab==='scan');
  document.getElementById('btnCollection').classList.toggle('activeBtn', tab==='collection');

  if (tab === 'scan') startCamera();
  render();
}

function render() {
  let div = document.getElementById('collectionList');
  div.innerHTML = '';

  for (let name in collection) {
    let c = collection[name];

    div.innerHTML += `
      <div class="card">
        <img src="${c.image}">
        <div>
          <b>${name}</b><br>x${c.count}
        </div>
        <button class="removeBtn" onclick="removeCard('${name.replace(/'/g,"\\'")}')">❌</button>
      </div>`;
  }
}

async function startCamera() {
  try {
    let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video.srcObject = stream;
    statusDiv.innerText = "📷 Kamera aktiv – Karte halten";
    loop();
  } catch {
    statusDiv.innerText = "❌ Kamera nicht verfügbar";
  }
}

function preprocess(canvas) {
  let ctx = canvas.getContext('2d');
  let img = ctx.getImageData(0,0,canvas.width,canvas.height);
  let d = img.data;

  for (let i=0;i<d.length;i+=4){
    let avg=(d[i]+d[i+1]+d[i+2])/3;
    let val=avg>140?255:0;
    d[i]=d[i+1]=d[i+2]=val;
  }

  ctx.putImageData(img,0,0);
}

function clean(text){
  return text.replace(/[^a-zA-Z' ]/g,'')
    .split('\n')
    .map(l=>l.trim())
    .filter(l=>l.length>2);
}

async function scanOnce(){
  if (scanning) return;

  if (video.videoWidth === 0) {
    statusDiv.innerText = "⏳ Kamera lädt...";
    return;
  }

  scanning = true;
  setTimeout(()=>scanning=false,5000);

  let canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  let ctx = canvas.getContext('2d');
  ctx.drawImage(video,0,0);

  let cropY = canvas.height * 0.1;
  let cropH = canvas.height * 0.2;

  let part = document.createElement('canvas');
  part.width = canvas.width;
  part.height = cropH;

  let pctx = part.getContext('2d');
  pctx.drawImage(canvas,0,cropY,canvas.width,cropH,0,0,canvas.width,cropH);

  preprocess(part);

  try {
    let res = await Tesseract.recognize(part.toDataURL(),'eng');

    let text = res.data.text || "";
    let confidence = res.data.confidence || 0;

    if (confidence < 45) {
      statusDiv.innerText = "⚠️ Unsicher";
      scanning = false;
      return;
    }

    let candidates = clean(text);

    if (candidates.length === 0) {
      statusDiv.innerText = "⚠️ Kein Text";
      scanning = false;
      return;
    }

    // SMART MATCHING
    let best = null;

    for (let c of candidates) {
      try {
        let r = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(c)}`);
        let d = await r.json();

        if (d.object !== "error") {
          best = d;
          break;
        }
      } catch {}
    }

    if (!best) {
      statusDiv.innerText = "❌ Kein Treffer";
      scanning = false;
      return;
    }

    if (best.name === lastCard) {
      scanning = false;
      return;
    }

    lastCard = best.name;

    let img = best.image_uris?.small || best.card_faces?.[0]?.image_uris?.small;

    if (!collection[best.name]) collection[best.name] = {count:0,image:img};
    collection[best.name].count++;

    save();

    statusDiv.innerText = "✅ " + best.name;

    flash.classList.add('active');
    setTimeout(()=>flash.classList.remove('active'),200);

  } catch {
    statusDiv.innerText = "❌ Fehler";
  }

  scanning = false;
}

async function loop(){
  await scanOnce();
  setTimeout(loop,1500);
}

startCamera();
render();
</script>

</body>
</html>
