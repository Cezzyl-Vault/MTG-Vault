# ══════════════════════════════════════════════════════════
#  Auto-Versionierung  (commit-count-basiert)
# ══════════════════════════════════════════════════════════
#
#  Was diese Action tut:
#  Bei jedem Push auf den konfigurierten Branch:
#  1. Zählt die Anzahl der "echten" Commits in der Git-Historie
#     (Commits, die NICHT vom Auto-Bump-Job stammen — erkennbar am
#     "[skip ci]"-Marker in der Commit-Message).
#  2. Setzt die Versionsnummer in index.html auf v0.<count>.
#  3. Committet zurück mit "[skip ci]" — verhindert Endlosschleife,
#     weil unten ein "if: !contains(...)" diesen Commit ignoriert.
#
#  Vorteil gegenüber der vorherigen Variante:
#  Die Versionsnummer kommt jetzt aus der Git-Historie, nicht aus der
#  HTML-Datei. Egal welcher Wert in einer hochgeladenen index.html steht
#  — die Action setzt ihn beim nächsten Push immer auf den korrekten
#  Stand. Damit kann auch ein Datei-Upload mit veralteter Version den
#  Counter nicht zurückwerfen.

name: Auto-Version Bump

on:
  push:
    branches:
      - Sammlung-mit-Auto-Import   # Hauptbranch
      - main                        # Fallback, falls main genutzt wird

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    # NICHT laufen lassen, wenn der Commit von dieser Action selbst kam
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Code auschecken (mit voller Historie)
        uses: actions/checkout@v4
        with:
          # WICHTIG: fetch-depth: 0 — sonst kann die Action die Commits
          # nicht zählen (per default holt checkout nur den letzten Commit)
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Versionsnummer aus Commit-Count berechnen
        id: ver
        run: |
          # Zählt alle Commits, deren Message NICHT "[skip ci]" enthält.
          # --invert-grep dreht das --grep-Filter um.
          COUNT=$(git log --invert-grep --grep="\[skip ci\]" --format="%H" | wc -l)
          if [ "$COUNT" -lt "1" ]; then COUNT=1; fi

          NEW_VERSION="v0.${COUNT}"
          echo "Echte Commits auf dem Branch: $COUNT"
          echo "Neue Version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: index.html aktualisieren
        run: |
          # Ersetzt nur das ERSTE Vorkommen (im Header) — falls
          # später noch andere Versionsnummern im Code stehen, bleiben die unangetastet
          sed -i "0,/v0\.[0-9]\+/s//${{ steps.ver.outputs.new_version }}/" index.html

      - name: Änderung zurück committen (nur falls etwas neu ist)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Versionsnummer ist bereits aktuell — kein Commit nötig."
          else
            git add index.html
            git commit -m "chore: bump version to ${{ steps.ver.outputs.new_version }} [skip ci]"
            git push
          fi
