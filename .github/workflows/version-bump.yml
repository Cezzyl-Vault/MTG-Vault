# ══════════════════════════════════════════════════════════
#  Auto-Versionierung
# ══════════════════════════════════════════════════════════
#
#  Was diese Action tut:
#  Bei jedem Push auf den konfigurierten Branch:
#  1. Liest die aktuelle Version aus index.html (z.B. "v0.5")
#  2. Erhöht die Zahl um 1 (zu "v0.6")
#  3. Schreibt sie zurück in index.html
#  4. Committet die Änderung mit "[skip ci]" - damit die Action
#     nicht durch ihren eigenen Commit erneut getriggert wird
#     (sonst Endlosschleife!)
#
#  Falls du die Versionsnummer mal manuell setzen willst (z.B. zurück
#  auf v0.0 vor einem Release), edit einfach index.html direkt - die
#  Action zählt von dort weiter hoch.

name: Auto-Version Bump

on:
  push:
    branches:
      - Sammlung-mit-Auto-Import   # Hauptbranch hier eintragen
      - main                        # Fallback - wird ignoriert wenn nicht existent

permissions:
  contents: write   # damit die Action committen darf

jobs:
  bump-version:
    runs-on: ubuntu-latest
    # Wichtig: NICHT laufen lassen, wenn der Commit von dieser Action selbst kam
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
        with:
          # Voller Verlauf nicht nötig, aber Token muss schreibfähig sein
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Version in index.html erhöhen
        run: |
          # Aktuelle Version aus index.html extrahieren (Pattern: v0.ZAHL)
          CURRENT=$(grep -oE 'v0\.[0-9]+' index.html | head -1)

          if [ -z "$CURRENT" ]; then
            echo "Keine Versionsnummer im Format v0.X in index.html gefunden - Action bricht ab."
            exit 0
          fi

          # Zahl extrahieren und um 1 erhöhen
          NUMBER=$(echo "$CURRENT" | sed 's/v0\.//')
          NEW_NUMBER=$((NUMBER + 1))
          NEW_VERSION="v0.${NEW_NUMBER}"

          echo "Alte Version: $CURRENT  →  Neue Version: $NEW_VERSION"

          # In index.html ersetzen (nur das erste Vorkommen, das im Header)
          sed -i "0,/${CURRENT}/s//${NEW_VERSION}/" index.html

      - name: Änderung zurück committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Nur committen wenn sich tatsächlich etwas geändert hat
          if git diff --quiet; then
            echo "Keine Änderung - überspringe Commit."
          else
            git add index.html
            git commit -m "chore: bump version [skip ci]"
            git push
          fi
